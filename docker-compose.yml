services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app

  vault:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
    command: ["python", "-m", "daemons.data_vault_daemon", "--loop", "300"]
    restart: unless-stopped
    depends_on:
      - api

  # Cloudflare Tunnel — exposes the API to the internet via your domain
  # 1. Create a tunnel:  cloudflared tunnel create botero-trade
  # 2. Add your token to .env:  CLOUDFLARE_TUNNEL_TOKEN=your-token
  # 3. Configure DNS in Cloudflare dashboard to point your domain to this tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - api
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
